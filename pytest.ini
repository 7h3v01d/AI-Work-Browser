[pytest]
testpaths = tests
qt_api = pyside6
addopts = -q

# NOTE on the occasional QtWebEngine segfault-on-shutdown:
# QtWebEngine's Chromium backend can occasionally segfault during Python
# interpreter shutdown, after a test has already completed and passed —
# a known upstream Qt/Chromium teardown-ordering issue, unrelated to test
# correctness. On Linux/macOS you can isolate each test in its own
# subprocess (via pytest-forked) so that crash never affects the overall
# exit code:
#
#   pytest --forked
#
# --forked is NOT the default here because pytest-forked uses os.fork(),
# which doesn't exist on Windows and makes the whole run fail immediately
# there (INTERNALERROR: module 'os' has no attribute 'fork'). If you're
# on Windows, just run `pytest` (no --forked).
